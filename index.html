<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Analyzer Dashboard</title>
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      background: #0d1117;
      color: #c9d1d9;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: #0d1117;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      z-index: 10;
    }

    header h1 { font-size: 14px; color: #58a6ff; font-weight: normal; letter-spacing: 1px; }
    header span { font-size: 11px; color: #484f58; }

    .sidebar {
      position: fixed;
      top: 48px; left: 0; bottom: 24px;
      width: 260px;
      border-right: 1px solid #21262d;
      overflow-y: auto;
      padding: 16px 14px;
    }

    .sidebar-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #484f58;
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #161b22;
      font-size: 11px;
    }
    .stat-row .label { color: #8b949e; }
    .stat-row .value { color: #e6edf3; }

    .device-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 9px 11px;
      margin-bottom: 7px;
      cursor: pointer;
      font-size: 11px;
      transition: border-color 0.15s;
    }
    .device-card:hover { border-color: #58a6ff; }
    .device-card.selected { border-color: #58a6ff; background: #1c2d3f; }
    .device-card .ip { color: #58a6ff; font-size: 12px; margin-bottom: 3px; }
    .device-card .hostname { color: #3fb950; font-size: 10px; margin-top: 2px; }

    .badge {
      display: inline-block;
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .badge-router  { background: #1f3a5f; color: #58a6ff; }
    .badge-host    { background: #1a2f1a; color: #3fb950; }
    .badge-mobile  { background: #3a1f5f; color: #c084fc; }
    .badge-tv      { background: #3a2a10; color: #d29922; }
    .badge-printer { background: #2a1f1f; color: #f85149; }

    #graph-container {
      position: fixed;
      top: 48px; left: 260px; right: 0; bottom: 24px;
      background: #0d1117;
    }

    .bottombar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 24px;
      background: #161b22;
      border-top: 1px solid #21262d;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 10px;
      color: #484f58;
      gap: 24px;
    }

    .detail-panel {
      position: fixed;
      top: 64px; right: 16px;
      width: 220px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px;
      font-size: 11px;
      display: none;
      z-index: 20;
    }
    .detail-panel.visible { display: block; }
    .detail-panel h3 { color: #58a6ff; font-size: 13px; margin-bottom: 10px; font-weight: normal; }
    .detail-row { margin-bottom: 8px; }
    .detail-row .key { color: #484f58; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
    .detail-row .val { color: #e6edf3; margin-top: 1px; }
    .close-btn {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none; color: #484f58;
      cursor: pointer; font-size: 14px;
    }
    .close-btn:hover { color: #c9d1d9; }
  </style>
</head>
<body>

<header>
  <h1>◈ NETWORK ANALYZER</h1>
  <span>— Cisco Networking Academy practice project</span>
</header>

<aside class="sidebar">
  <div class="sidebar-label">Scan Info</div>
  <div class="stat-row"><span class="label">Network</span><span class="value" id="s-network">—</span></div>
  <div class="stat-row"><span class="label">Mask</span><span class="value" id="s-mask">—</span></div>
  <div class="stat-row"><span class="label">Scanned from</span><span class="value" id="s-ip">—</span></div>
  <div class="stat-row"><span class="label">Active hosts</span><span class="value" id="s-active">—</span></div>
  <div class="stat-row"><span class="label">Total possible</span><span class="value" id="s-total">—</span></div>
  <div class="stat-row"><span class="label">Scan time</span><span class="value" id="s-time">—</span></div>
  <div class="stat-row"><span class="label">Timestamp</span><span class="value" id="s-ts">—</span></div>

  <div class="sidebar-label">Devices</div>
  <div id="device-list"></div>
</aside>

<div id="graph-container"></div>

<div class="detail-panel" id="detail-panel">
  <button class="close-btn" onclick="closeDetail()">✕</button>
  <h3 id="d-ip">—</h3>
  <div class="detail-row"><span class="key">Hostname</span><div class="val" id="d-hostname">—</div></div>
  <div class="detail-row"><span class="key">Type</span><div class="val" id="d-type">—</div></div>
  <div class="detail-row"><span class="key">MAC Address</span><div class="val" id="d-mac">—</div></div>
</div>

<div class="bottombar">
  <span>Scroll to zoom · Drag to pan · Click a node for details</span>
  <span id="b-count"></span>
</div>

<script>
  const ICONS = {
    "Router / Gateway": "🌐",
    "Mobile device":    "📱",
    "Printer":          "🖨️",
    "Smart TV":         "📺",
    "Host":             "💻"
  };

  const BADGE = {
    "Router / Gateway": "badge-router",
    "Mobile device":    "badge-mobile",
    "Printer":          "badge-printer",
    "Smart TV":         "badge-tv",
    "Host":             "badge-host"
  };

  const NODE_COLOR = {
    "Router / Gateway": { bg: "#1f3a5f", border: "#58a6ff" },
    "Mobile device":    { bg: "#3a1f5f", border: "#c084fc" },
    "Printer":          { bg: "#2a1f1f", border: "#f85149" },
    "Smart TV":         { bg: "#3a2a10", border: "#d29922" },
    "Host":             { bg: "#1a2f1a", border: "#3fb950" }
  };

  let visNetwork = null;

  async function loadData() {
    // Try the real scan file first, fall back to embedded example data
    try {
      const res = await fetch("scan_result.json");
      if (res.ok) return await res.json();
    } catch (_) {}

    // Fallback — embedded example so the dashboard always has something to show
    return {
      "timestamp": "2025-06-20T19:45:32.104821",
      "network": "192.168.1.0/24",
      "subnet_mask": "255.255.255.0",
      "scanner_ip": "192.168.1.100",
      "total_possible": 254,
      "total_active": 6,
      "duration_seconds": 2.7,
      "devices": [
        { "ip": "192.168.1.1",   "hostname": "home-router.local", "mac": "a1-b2-c3-d4-e5-f6", "type": "Router / Gateway" },
        { "ip": "192.168.1.100", "hostname": "main-pc.local",     "mac": "n/a",                "type": "Host" },
        { "ip": "192.168.1.101", "hostname": "unknown",           "mac": "b2-c3-d4-e5-f6-a1", "type": "Host" },
        { "ip": "192.168.1.102", "hostname": "unknown",           "mac": "c3-d4-e5-f6-a1-b2", "type": "Mobile device" },
        { "ip": "192.168.1.103", "hostname": "unknown",           "mac": "d4-e5-f6-a1-b2-c3", "type": "Mobile device" },
        { "ip": "192.168.1.104", "hostname": "samsung-tv.local",  "mac": "e5-f6-a1-b2-c3-d4", "type": "Smart TV" }
      ]
    };
  }

  function formatTimestamp(ts) {
    return new Date(ts).toLocaleString("en-US", { dateStyle: "medium", timeStyle: "short" });
  }

  function buildSidebar(data) {
    document.getElementById("s-network").textContent = data.network;
    document.getElementById("s-mask").textContent    = data.subnet_mask;
    document.getElementById("s-ip").textContent      = data.scanner_ip;
    document.getElementById("s-active").textContent  = data.total_active;
    document.getElementById("s-total").textContent   = data.total_possible;
    document.getElementById("s-time").textContent    = data.duration_seconds + "s";
    document.getElementById("s-ts").textContent      = formatTimestamp(data.timestamp);
    document.getElementById("b-count").textContent   = `${data.total_active} active hosts on ${data.network}`;

    const list = document.getElementById("device-list");
    data.devices.forEach((d, i) => {
      const card = document.createElement("div");
      card.className = "device-card";
      card.id = `card-${i}`;
      card.innerHTML = `
        <div class="ip">${d.ip}</div>
        <div>${ICONS[d.type] || "💻"} <span class="badge ${BADGE[d.type] || "badge-host"}">${d.type}</span></div>
        ${d.hostname !== "unknown" ? `<div class="hostname">${d.hostname}</div>` : ""}
      `;
      card.onclick = () => selectDevice(i, d);
      list.appendChild(card);
    });
  }

  function buildGraph(data) {
    const nodes = [];
    const edges = [];

    const routerIdx = data.devices.findIndex(d => d.type === "Router / Gateway");

    data.devices.forEach((d, i) => {
      const c = NODE_COLOR[d.type] || NODE_COLOR["Host"];
      const isRouter = d.type === "Router / Gateway";
      nodes.push({
        id: i,
        label: `${ICONS[d.type] || "💻"}\n${d.ip}`,
        color: { background: c.bg, border: c.border, highlight: { background: c.bg, border: "#ffffff" } },
        font: { color: "#c9d1d9", size: isRouter ? 13 : 11, face: "Courier New" },
        size: isRouter ? 34 : 22,
        shape: "box",
        borderWidth: isRouter ? 2 : 1,
        margin: 8
      });

      if (routerIdx >= 0 && i !== routerIdx) {
        edges.push({
          from: routerIdx,
          to: i,
          color: { color: "#30363d", highlight: "#58a6ff" },
          width: 1
        });
      }
    });

    const container = document.getElementById("graph-container");

    const options = {
      physics: {
        enabled: true,
        solver: "repulsion",
        repulsion: { nodeDistance: 150, springLength: 200, springConstant: 0.05 },
        stabilization: { enabled: true, iterations: 100, fit: true }
      },
      interaction: { hover: true, zoomView: true, dragView: true },
      layout: { randomSeed: 42 }
    };

    visNetwork = new vis.Network(
      container,
      { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) },
      options
    );

    visNetwork.once("stabilizationIterationsDone", () => {
      visNetwork.fit({ animation: { duration: 600, easingFunction: "easeInOutQuad" } });
    });

    visNetwork.on("click", params => {
      if (params.nodes.length > 0) {
        const idx = params.nodes[0];
        selectDevice(idx, data.devices[idx]);
      } else {
        closeDetail();
      }
    });
  }

  function selectDevice(idx, d) {
    document.querySelectorAll(".device-card").forEach(c => c.classList.remove("selected"));
    const card = document.getElementById(`card-${idx}`);
    if (card) { card.classList.add("selected"); card.scrollIntoView({ block: "nearest" }); }

    document.getElementById("d-ip").textContent       = d.ip;
    document.getElementById("d-hostname").textContent = d.hostname;
    document.getElementById("d-type").textContent     = `${ICONS[d.type] || "💻"} ${d.type}`;
    document.getElementById("d-mac").textContent      = d.mac || "n/a";
    document.getElementById("detail-panel").classList.add("visible");

    if (visNetwork) visNetwork.focus(idx, { scale: 1.2, animation: { duration: 400 } });
  }

  function closeDetail() {
    document.getElementById("detail-panel").classList.remove("visible");
    document.querySelectorAll(".device-card").forEach(c => c.classList.remove("selected"));
  }

  // Boot
  loadData().then(data => {
    buildSidebar(data);
    buildGraph(data);
  });
</script>

</body>
</html>
